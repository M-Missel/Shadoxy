# Server
server.port=8080
server.threads=4

# Upstream (NONE, HTTP, SOCKS5)
upstream.type=NONE
upstream.host=
upstream.port=0

# Anonymizer
anonymizer.strip-headers=X-Forwarded-For,Via,X-Real-IP
anonymizer.rotate-user-agent=false
anonymizer.block-cookies=false

# Filter
filter.enabled=false
filter.blocklist-path=configs/blocklist.txt

# Logging (TRACE, DEBUG, INFO, WARN, ERROR)
logging.level=DEBUG
logging.type=FILE

# MITM
mitm.enabled=false
mitm.ca-cert-path=
mitm.ca-key-path=